name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      core-released: ${{ steps.release.outputs['packages/core--release_created'] }}
      core-tag: ${{ steps.release.outputs['packages/core--tag_name'] }}
      mcp-released: ${{ steps.release.outputs['packages/mcp-server--release_created'] }}
      mcp-tag: ${{ steps.release.outputs['packages/mcp-server--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-core:
    name: Publish @oss-scout/core to npm
    needs: release-please
    if: needs.release-please.outputs.core-released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.core-tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish @oss-scout/core
        run: pnpm --filter @oss-scout/core publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp:
    name: Publish @oss-scout/mcp to npm
    needs: [release-please, publish-core]
    if: >-
      always()
      && !failure()
      && !cancelled()
      && needs.release-please.outputs.mcp-released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.mcp-tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (required by mcp-server)
        run: pnpm --filter @oss-scout/core run build

      - name: Publish @oss-scout/mcp
        run: pnpm --filter @oss-scout/mcp publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
