name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so @oss-scout/mcp's typecheck, tests, and bundle resolve
      # @oss-scout/core through its published dist/ (the artifact consumers
      # actually get), not a stale or missing build (#149).
      - name: Build
        run: pnpm -r run build

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test with coverage
        run: pnpm -r run test:coverage

      - name: Bundle
        run: pnpm -r run bundle

  # Advisory-only: a new transitive advisory should not block unrelated PRs.
  # Failures surface as a red job here without failing required checks.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # continue-on-error until pnpm ships the bulk advisory endpoint (#268):
      # npm retired the legacy audit endpoint 2026-07-15 (HTTP 410), so this
      # step fails on every branch through no fault of the diff. Revert to
      # hard-fail once a fixed pnpm version is pinned in packageManager.
      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
